name: Build Ltw-fear

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Install Vulkan SDK and CMake
      - name: Install Vulkan SDK and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y vulkan-tools libvulkan-dev cmake

      # Generate Gradle Wrapper (if missing)
      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Generating Gradle Wrapper..."
            gradle wrapper --gradle-version 8.6 --distribution-type bin
          else
            echo "Gradle Wrapper already exists."
          fi

      # Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Build the mod (skip tests for speed)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # Build C++ (Vulkan Renderer)
      - name: Build Vulkan Renderer
        run: |
          mkdir -p build/native
          cd build/native
          cmake ../..
          make

      # Upload Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ltw-fear
          path: |
            build/libs/
            build/native/
            gradlew
            gradle/
