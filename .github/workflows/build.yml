name: Build Vulkan Performance Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-natives-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compile Linux x64 Native
        run: |
          mkdir -p src/main/resources/nativelib/x64
          g++ -O3 -shared -fPIC -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux src/main/cpp/vulkan_performance.cpp -o src/main/resources/nativelib/x64/libvulkan_performance.so
      - name: Upload x64 Native
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: src/main/resources/nativelib/x64/libvulkan_performance.so

  build-natives-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install ARM Cross-Compiler
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
      - name: Compile Linux ARM64 Native
        run: |
          mkdir -p src/main/resources/nativelib/arm64
          aarch64-linux-gnu-g++ -O3 -shared -fPIC -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux src/main/cpp/vulkan_performance.cpp -o src/main/resources/nativelib/arm64/libvulkan_performance.so
      - name: Upload ARM64 Native
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: src/main/resources/nativelib/arm64/libvulkan_performance.so

  build-natives-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Compile Windows x64 Native
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/main/resources/nativelib/x64
          cl.exe /O2 /LD /I"$env:JAVA_HOME/include" /I"$env:JAVA_HOME/include/win32" src/main/cpp/vulkan_performance.cpp /link /out:src/main/resources/nativelib/x64/vulkan_performance.dll
      - name: Upload Windows Native
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64
          path: src/main/resources/nativelib/x64/vulkan_performance.dll

  build-mod:
    needs: [build-natives-linux-x64, build-natives-linux-arm64, build-natives-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download x64 Linux Native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: src/main/resources/nativelib/x64
      - name: Download ARM64 Linux Native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: src/main/resources/nativelib/arm64
      - name: Download x64 Windows Native
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: src/main/resources/nativelib/x64
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: Vulkan-Performance-Mod-Multiarch
          path: build/libs/*-remapped.jar
