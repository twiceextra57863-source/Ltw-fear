name: Build VulkanBoost

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Setup C++ (Vulkan)
      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y vulkan-tools libvulkan-dev cmake

      # Build Java (Fabric Mod)
      - name: Build Fabric Mod
        run: ./gradlew build

      # Build C++ (Vulkan Renderer)
      - name: Build Vulkan Renderer
        run: |
          mkdir -p build/native
          cd build/native
          cmake ../..
          make

      # Upload Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VulkanBoost
          path: |
            build/libs/
            build/native/
