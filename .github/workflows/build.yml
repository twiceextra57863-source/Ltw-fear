name: Build Vulkan Performance Mod Ultimate

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-natives-linux:
    name: Build Linux Natives (x64 & ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install ARM Cross-Compiler
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
      - name: Compile Natives
        run: |
          mkdir -p src/main/resources/nativelib/x64
          mkdir -p src/main/resources/nativelib/arm64
          # Compile x64
          g++ -O3 -shared -fPIC -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux src/main/cpp/vulkan_performance.cpp -o src/main/resources/nativelib/x64/libvulkan_performance.so
          # Compile ARM64
          aarch64-linux-gnu-g++ -O3 -shared -fPIC -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux src/main/cpp/vulkan_performance.cpp -o src/main/resources/nativelib/arm64/libvulkan_performance.so
      - name: Upload Linux Natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-linux
          path: src/main/resources/nativelib/
          retention-days: 1

  build-natives-windows:
    name: Build Windows Natives (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Compile Windows Native
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/main/resources/nativelib/x64
          cl.exe /O2 /LD /I"$env:JAVA_HOME/include" /I"$env:JAVA_HOME/include/win32" src\main\cpp\vulkan_performance.cpp /link /out:src\main\resources\nativelib\x64\vulkan_performance.dll
      - name: Upload Windows Native
        uses: actions/upload-artifact@v4
        with:
          name: natives-windows
          path: src/main/resources/nativelib/x64/vulkan_performance.dll
          retention-days: 1

  build-mod:
    name: Build Final Mod JAR & ZIP
    needs: [build-natives-linux, build-natives-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download Linux Natives
        uses: actions/download-artifact@v4
        with:
          name: natives-linux
          path: src/main/resources/nativelib/
      - name: Download Windows Native
        uses: actions/download-artifact@v4
        with:
          name: natives-windows
          path: src/main/resources/nativelib/x64/
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build
      - name: Create Ultimate Pack ZIP
        run: |
          mkdir -p release_zip
          # Correctly identify the final JAR from the libs folder (Fabric Loom 1.7 typically doesn't use -remapped anymore)
          cp build/libs/vulkan-performance-mod-*.jar release_zip/vulkan-performance-mod-ultimate.jar
          # Remove the sources jar from the zip if it was copied by the wildcard
          rm -f release_zip/*-sources.jar
          echo "Vulkan Performance Mod Ultimate v1.0
          --------------------------------------
          Works on: PC (Windows/Linux) and Mobile (PojavLauncher/Android)

          Installation:
          1. Copy 'vulkan-performance-mod-ultimate.jar' to your 'mods' folder.
          2. Launch Minecraft 1.21.4 with Fabric.
          3. Performance boost will activate automatically.

          Features:
          - Native Process Priority Boost (C++)
          - Entity Culling (64 blocks) for SMP smoothness
          - High-Stress Particle Optimization
          - No Interaction Cooldown for Fast Placement
          - Anti-Lag Combat System (Crit Fix)" > release_zip/README.txt
          zip -r Vulkan-Performance-Ultimate-Pack.zip release_zip
      - name: Upload Ultimate ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vulkan-Performance-Ultimate-Build
          path: Vulkan-Performance-Ultimate-Pack.zip
